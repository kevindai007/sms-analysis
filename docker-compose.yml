version: '3.8'

services:
  sms-analysis:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sms_analysis.db:/app/sms_analysis.db
    environment:
      - DATABASE_URL=sqlite:///./sms_analysis.db
    restart: unless-stopped

